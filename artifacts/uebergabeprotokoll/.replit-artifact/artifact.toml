kind = "web"
previewPath = "/"
title = "Übergabeprotokoll"
version = "1.0.0"
id = "artifacts/uebergabeprotokoll"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25550

[services.development]
run = "pnpm --filter @workspace/uebergabeprotokoll run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uebergabeprotokoll", "run", "build" ]
publicDir = "artifacts/uebergabeprotokoll/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25550"
BASE_PATH = "/"
