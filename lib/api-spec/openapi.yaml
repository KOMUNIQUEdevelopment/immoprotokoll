openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: billing
    description: Stripe billing, subscription management, and plan limits
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account and owner user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and destroy session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get currently authenticated user
      responses:
        "200":
          description: Current user and account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/account:
    get:
      operationId: getAccount
      tags: [auth]
      summary: Get the current user's account details
      responses:
        "200":
          description: Account details (nullable if account not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    oneOf:
                      - $ref: "#/components/schemas/Account"
                      - type: "null"
                required:
                  - account
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List users in the account (owner or administrator only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/users/invite:
    post:
      operationId: inviteUser
      tags: [auth]
      summary: Invite a user to the account (owner or administrator only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserRequest"
      responses:
        "201":
          description: User invited
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/AuthUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/users/{userId}:
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Remove a user from the account (owner only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /billing/config:
    get:
      operationId: getBillingConfig
      tags: [billing]
      summary: Get Stripe publishable key and plan prices
      responses:
        "200":
          description: Billing config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingConfig"

  /billing/subscription:
    get:
      operationId: getSubscription
      tags: [billing]
      summary: Get current subscription state and usage summary (authenticated)
      responses:
        "200":
          description: Subscription info with usage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /billing/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create Stripe Checkout session (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required: [url]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Stripe not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /billing/portal:
    post:
      operationId: createPortalSession
      tags: [billing]
      summary: Create Stripe Customer Portal session (owner only)
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required: [url]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: No billing account found

  /billing/webhook:
    post:
      operationId: stripeWebhook
      tags: [billing]
      summary: Stripe webhook receiver (Stripe-signed, raw body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Event received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        "400":
          description: Invalid signature
        "503":
          description: Stripe not configured

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      properties:
        id:
          type: string
        accountId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [owner, administrator, property_manager]
        isSuperAdmin:
          type: boolean
        preferredLanguage:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - accountId
        - email
        - firstName
        - lastName
        - role
        - isSuperAdmin
        - preferredLanguage
        - createdAt

    Account:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        plan:
          type: string
          enum: [free, privat, agentur, custom]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - plan
        - createdAt

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        accountName:
          type: string
      required:
        - email
        - password
        - firstName
        - lastName
        - accountName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    InviteUserRequest:
      type: object
      description: >
        Owners may assign any role (owner, administrator, property_manager).
        Administrators may only assign administrator or property_manager —
        assigning owner as an administrator returns 403.
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [owner, administrator, property_manager]
      required:
        - email
        - password
        - firstName
        - lastName
        - role

    AuthResponse:
      type: object
      description: >
        Returned by register, login, and /me. Includes the authenticated user
        and their associated account.
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        account:
          oneOf:
            - $ref: "#/components/schemas/Account"
            - type: "null"
      required:
        - user
        - account

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    BillingConfig:
      type: object
      properties:
        publishableKey:
          type: string
          nullable: true
        stripeEnabled:
          type: boolean
        plans:
          type: object
          properties:
            privat:
              type: object
              properties:
                monthly:
                  type: number
                annual:
                  type: number
              required: [monthly, annual]
            agentur:
              type: object
              properties:
                monthly:
                  type: number
                annual:
                  type: number
              required: [monthly, annual]
          required: [privat, agentur]
      required: [publishableKey, stripeEnabled, plans]

    UsageLimits:
      type: object
      properties:
        properties:
          type: integer
          nullable: true
        protocols:
          type: integer
          nullable: true
      required: [properties, protocols]

    UsageSummary:
      type: object
      properties:
        properties:
          type: integer
        protocols:
          type: integer
        limits:
          $ref: "#/components/schemas/UsageLimits"
      required: [properties, protocols, limits]

    SubscriptionInfo:
      type: object
      properties:
        plan:
          type: string
          enum: [free, privat, agentur, custom]
        currency:
          type: string
        billingInterval:
          type: string
          enum: [monthly, annual]
        subscriptionStatus:
          type: string
          enum: [active, trialing, past_due, canceled, unpaid, incomplete]
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        stripeCustomerId:
          type: string
          nullable: true
        stripeSubscriptionId:
          type: string
          nullable: true
        usage:
          $ref: "#/components/schemas/UsageSummary"
      required: [plan, currency, billingInterval]

    CheckoutRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [privat, agentur]
        interval:
          type: string
          enum: [monthly, annual]
        currency:
          type: string
          enum: [chf, eur, usd]
      required: [plan, interval]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
