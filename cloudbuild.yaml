# ============================================================
# ImmoProtokoll – Cloud Build CI/CD
# Trigger: Push to main branch via Replit Git Panel
# Region: europe-west6 (Zürich)
#
# Required substitution variables (set in Cloud Build Trigger):
#   _SQL_INSTANCE  – e.g. mein-projekt:europe-west6:immoprotokoll-db
#   _APP_DOMAIN    – CORS origins, e.g. https://immoprotokoll.com,https://app.immoprotokoll.com
#   _APP_BASE_URL  – e.g. https://immoprotokoll.com
#
# Required secrets in Secret Manager (europe-west6):
#   DATABASE_URL, SUPERADMIN_PASSWORD, RESEND_API_KEY,
#   STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET,
#   STRIPE_SECRET_KEY_TEST, STRIPE_PUBLISHABLE_KEY_TEST, STRIPE_WEBHOOK_SECRET_TEST
# ============================================================

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - europe-west6-docker.pkg.dev/$PROJECT_ID/immoprotokoll/app:$COMMIT_SHA
      - -t
      - europe-west6-docker.pkg.dev/$PROJECT_ID/immoprotokoll/app:latest
      - -f
      - artifacts/api-server/Dockerfile
      - .

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - europe-west6-docker.pkg.dev/$PROJECT_ID/immoprotokoll/app

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - immoprotokoll
      - --image=europe-west6-docker.pkg.dev/$PROJECT_ID/immoprotokoll/app:$COMMIT_SHA
      - --region=europe-west6
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$_SQL_INSTANCE
      - --set-env-vars=^|^NODE_ENV=production|ALLOWED_ORIGINS=$_APP_DOMAIN|APP_BASE_URL=$_APP_BASE_URL|STRIPE_PRICE_PRIVAT_MONTHLY_CHF=price_1TGicjRTCVhfZcc4dqbYENcY|STRIPE_PRICE_PRIVAT_MONTHLY_EUR=price_1TGickRTCVhfZcc4UpnvGgcX|STRIPE_PRICE_PRIVAT_MONTHLY_USD=price_1TGickRTCVhfZcc4HgfHOVwa|STRIPE_PRICE_PRIVAT_ANNUAL_CHF=price_1TGicjRTCVhfZcc4a1TUGN6J|STRIPE_PRICE_PRIVAT_ANNUAL_EUR=price_1TGickRTCVhfZcc4JB7ONTYN|STRIPE_PRICE_PRIVAT_ANNUAL_USD=price_1TGiclRTCVhfZcc4vitg16mE|STRIPE_PRICE_AGENTUR_MONTHLY_CHF=price_1TGiclRTCVhfZcc4ogxZOmLD|STRIPE_PRICE_AGENTUR_MONTHLY_EUR=price_1TGicmRTCVhfZcc4dg5V2yFp|STRIPE_PRICE_AGENTUR_MONTHLY_USD=price_1TGicmRTCVhfZcc4bUKzjaEq|STRIPE_PRICE_AGENTUR_ANNUAL_CHF=price_1TGiclRTCVhfZcc4GnjiiWBY|STRIPE_PRICE_AGENTUR_ANNUAL_EUR=price_1TGicmRTCVhfZcc4hXnt9BXW|STRIPE_PRICE_AGENTUR_ANNUAL_USD=price_1TGicmRTCVhfZcc43YX80EPo
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest
      - --update-secrets=SUPERADMIN_PASSWORD=SUPERADMIN_PASSWORD:latest
      - --update-secrets=RESEND_API_KEY=RESEND_API_KEY:latest
      - --update-secrets=STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest
      - --update-secrets=STRIPE_PUBLISHABLE_KEY=STRIPE_PUBLISHABLE_KEY:latest
      - --update-secrets=STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest
      - --update-secrets=STRIPE_SECRET_KEY_TEST=STRIPE_SECRET_KEY_TEST:latest
      - --update-secrets=STRIPE_PUBLISHABLE_KEY_TEST=STRIPE_PUBLISHABLE_KEY_TEST:latest
      - --update-secrets=STRIPE_WEBHOOK_SECRET_TEST=STRIPE_WEBHOOK_SECRET_TEST:latest
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --timeout=60s
      - --concurrency=100
      - --port=8080

substitutions:
  _SQL_INSTANCE: 'immoprotokoll-492520:europe-west6:immoprotokoll-db'
  _APP_DOMAIN: 'https://immoprotokoll.com,https://app.immoprotokoll.com'
  _APP_BASE_URL: 'https://immoprotokoll.com'

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  machineType: E2_HIGHCPU_8
